name: 🚀 CI/CD Pipeline - Energia Sustentável

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ===== JOB 1: BUILD & TEST =====
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4

    - name: ☕ Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: 🔨 Build com Maven
      run: mvn clean compile

    - name: ✅ Rodar testes
      run: mvn test

    - name: 📊 Gerar relatório de testes
      if: always()
      run: mvn surefire-report:report

    - name: 📦 Package aplicação
      run: mvn package -DskipTests

    - name: 📤 Upload artefatos
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar

  # ===== JOB 2: CODE QUALITY (Opcional) =====
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🔍 Analisar código
      run: mvn clean verify -DskipTests

  # ===== JOB 3: BUILD DOCKER =====
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Build Docker Image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔐 Setup Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: 🐳 Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: energia-sustentavel:latest
        outputs: type=docker,dest=/tmp/image.tar

    - name: 📤 Upload Docker image
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: /tmp/image.tar

  # ===== JOB 4: DEPLOY STAGING =====
  deploy-staging:
    needs: docker-build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🚀 Deploy para Staging
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🌍 STAGING DEPLOYMENT"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📦 Ambiente: STAGING"
        echo "🔗 URL: https://staging-energia.example.com"
        echo "📅 Data: $(date)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "✅ Deploy em STAGING concluído com SUCESSO!"
        echo ""
        echo "Próximo: Deploy em PRODUÇÃO"

  # ===== JOB 5: DEPLOY PRODUCTION =====
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🚀 Deploy para Produção
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🌍 PRODUCTION DEPLOYMENT"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📦 Ambiente: PRODUCTION"
        echo "🔗 URL: https://energia.example.com"
        echo "📅 Data: $(date)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "✅ Deploy em PRODUÇÃO concluído com SUCESSO!"
        echo ""
        echo "🎉 Pipeline completo!"

  # ===== JOB 6: NOTIFY =====
  notify:
    needs: [ build-and-test, deploy-production ]
    runs-on: ubuntu-latest
    name: Notify Success
    if: always()
    
    steps:
    - name: 📢 Pipeline Summary
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "✨ PIPELINE CONCLUÍDO ✨"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📊 Status: ${{ job.status }}"
        echo "🔧 Workflow: ${{ github.workflow }}"
        echo "📝 Commit: ${{ github.sha }}"
        echo "👤 Autor: ${{ github.actor }}"
        echo "🕐 Tempo: $(date)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
