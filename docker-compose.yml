version: '3.8'

services:
  # Oracle Database
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-energia-sustentavel
    shm_size: '1gb'
    environment:
      ORACLE_PASSWORD: oracle
      ORACLE_DATABASE: XEPDB1
      APP_USER: energia_user
      APP_USER_PASSWORD: energia_pass
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - energia-network

  # Aplicação Spring Boot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: energia-sustentavel-app
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521:XE
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    networks:
      - energia-network
    restart: unless-stopped

volumes:
  oracle-data:
    driver: local

networks:
  energia-network:
    driver: bridge
